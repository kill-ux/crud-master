openapi: 3.0.0
info:
  title: CRUD Master API Gateway
  description: API Gateway for the Movie Inventory and Billing services.
  version: 1.0.0
servers:
  - url: http://localhost:5000
    description: Development server
paths:
  # Inventory Endpoints
  /api/movies/:
    get:
      summary: List all movies
      parameters:
        - name: title
          in: query
          description: Filter movies by title
          required: false
          schema:
            type: string
      responses:
        '200':
          description: A list of movies
    post:
      summary: Create a movie
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: {type: string}
                description: {type: string}
      responses:
        '201':
          description: Created
    delete:
      summary: Delete all movies
      responses:
        '204':
          description: No Content
  
  /api/movies/{id}:
    get:
      parameters: [{name: id, in: path, required: true, schema: {type: integer}}]
      responses: {'200': {description: Movie details}}
    put:
      parameters: [{name: id, in: path, required: true, schema: {type: integer}}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: {type: string}
                description: {type: string}
      responses: {'200': {description: Updated}}
    delete:
      parameters: [{name: id, in: path, required: true, schema: {type: integer}}]
      responses: {'204': {description: Deleted}}

  # Billing Endpoints
  /api/billing/:
    post:
      summary: Place an order (Async via RabbitMQ)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, number_of_items, total_amount]
              properties:
                user_id: {type: string}
                number_of_items: {type: integer}
                total_amount: {type: number}
      responses:
        '202':
          description: Order request accepted
  
  /api/orders/:
    get:
      summary: List all processed orders
      responses:
        '200':
          description: A list of orders
